<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>واصل 2026 - لوحة التحكم</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #0f0c29; /* لون غامق ليتناسب مع هوية واصل */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container { position: relative; width: 100%; height: 100%; }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            opacity: 0; /* مخفي حتى يكتمل التحميل */
            transition: opacity 0.5s ease;
        }

        .loading-screen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .loader {
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #6a1b9a;
            border-radius: 50%;
            width: 60px; height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        p { color: white; font-weight: bold; font-size: 1.1em; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader-screen" class="loading-screen">
            <div class="loader"></div>
            <p>جاري تشغيل نظام واصل...</p>
        </div>
        
        <iframe 
            id="wassel-iframe"
            src="https://script.google.com/macros/s/AKfycbxLtsgIpAUBHkvtixGv4hbwNVItLzMoLth-CdEF79mLLenRG5f2E7D-lNEbVAIf_Q/exec" 
            allowfullscreen="true"
            allow="geolocation; microphone; camera; display-capture"
            title="Wassel System"
            onload="hideLoader()"> </iframe>
    </div>

    <script>
        function hideLoader() {
            // إخفاء شاشة التحميل وإظهار النظام بسلاسة
            document.getElementById('loader-screen').style.display = 'none';
            document.getElementById('wassel-iframe').style.opacity = '1';
        }
    </script>
</body>
</html>
